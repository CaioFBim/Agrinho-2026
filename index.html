<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importancia do agro</title>
    
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: #ffffff;
            margin: 0;
            padding: 50px;
            overflow-x: hidden;
        }
        
        h1 {
            color: #71E86B; /* Verde claro */
            font-size: 55px;
            text-transform: uppercase;
            font-family: 'Impact', sans-serif; /* Fonte mais grossa e reta */
            /* Simulando a borda preta grossa da imagem */
            text-shadow:
                -2px -2px 0 #000,
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000,
                 0px  3px 0 #000; 
            margin-bottom: 60px;
        }

        .galeria {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 50px;
        }

        /* Criando o efeito de fotos Polaroid */
        .galeria img {
            width: 220px;
            height: 280px;
            object-fit: cover;
            background-color: #f4f4f0;
            padding: 10px 10px 40px 10px; /* Bordas desiguais (maior embaixo) */
            border: 1px solid #ccc;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.15);
            margin: -20px; /* Faz as imagens se sobreporem um pouco */
        }

        /* Rotacionando as imagens para imitar o efeito "colado torto" */
        .galeria img:nth-child(1) { transform: rotate(-15deg); z-index: 1;}
        .galeria img:nth-child(2) { transform: rotate(-5deg); z-index: 2; }
        .galeria img:nth-child(3) { transform: rotate(5deg); z-index: 3; }
        .galeria img:nth-child(4) { transform: rotate(15deg); z-index: 4; }

        /* Estilo do botão */
        .btn-proximo {
            background-color: #71E86B;
            color: white;
            font-size: 20px;
            font-weight: bold;
            padding: 20px 40px;
            border: 6px solid black;
            border-radius: 20px; /* Deixa o botão arredondado */
            cursor: pointer;
            box-shadow: 4px 4px 0px black; /* Dá o efeito de profundidade sólido */
        }
    </style>
</head>
<body>
    <main>
        <div>
            <h1>A Importancia do Agro</h1>

            <div class="galeria">
                <img src="silos.png" alt="Silos de armazenagem">
                <img src="plantacao.png" alt="Mão segurando broto de planta">
                <img src="bandeira.png" alt="Pessoa segurando a bandeira do Brasil">
                <img src="trator.png" alt="Trator trabalhando na plantação">
            </div>

            <br><br>

            <button class="btn-proximo" data-proximo="">CLIQUE PARA SABER SOBRE!</button>
        </div>
    </main>
</body>
</html>
